<script>
const API_URL = "https://meal-logger-973733682193.asia-east1.run.app";
let currentBase64 = "";

// =====================
// IMAGE UPLOAD
// =====================
const imageInput = document.getElementById('imageInput');
const previewImage = document.getElementById('previewImage');
const uploadText = document.getElementById('uploadText');

imageInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        previewImage.src = event.target.result;
        previewImage.style.display = 'block';
        uploadText.style.display = 'none';
        currentBase64 = event.target.result.split(",")[1];
    };
    reader.readAsDataURL(file);
});

// =====================
// ANALYZE
// =====================
async function analyzeImage() {
    if (!currentBase64) return alert("請先選圖片");

    updateStatus("AI 分析中...");
    toggleInputs(false);

    callApi({ image: currentBase64 });
}

// =====================
// RE-ANALYZE
// =====================
async function reAnalyze() {
    const correction = document.getElementById("correctionInput").value;
    if (!correction) return alert("請輸入修正");

    updateStatus("重新分析中...");
    toggleInputs(false);

    callApi({
        image: currentBase64,
        correction: correction
    });
}

// =====================
// API CALL
// =====================
async function callApi(payload) {
    try {
        const res = await fetch(API_URL + "/analyze", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        });

        const text = await res.text();
        console.log("RAW RESPONSE:", text);

        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            const match = text.match(/\{[\s\S]*\}/);
            if (!match) throw new Error("後端回傳不是 JSON");
            data = JSON.parse(match[0]);
        }

        fillForm(data);
        updateStatus("分析完成");
        document.getElementById("correctionPanel").style.display = "block";

    } catch (err) {
        updateStatus("錯誤: " + err.message);
        console.error(err);
    } finally {
        toggleInputs(true);
    }
}

// =====================
// FILL FORM
// =====================
function fillForm(data) {
    document.getElementById("content").value = data.content || "";
    document.getElementById("calories").value = data.calories ?? 0;
    document.getElementById("protein").value = data.protein ?? 0;
    document.getElementById("fat").value = data.fat ?? 0;
    document.getElementById("carbs").value = data.carbs ?? 0;
    document.getElementById("weight").value = data.weight ?? 0;

    document.getElementById("uploadBtn").disabled = false;
}

// =====================
// UPLOAD TO SHEET
// =====================
async function uploadData() {
    updateStatus("寫入中...");
    toggleInputs(false);

    const payload = {
        date: new Date().toLocaleDateString("zh-TW"),
        category: "AI辨識",
        content: document.getElementById("content").value,
        calories: document.getElementById("calories").value,
        protein: document.getElementById("protein").value,
        fat: document.getElementById("fat").value,
        carbs: document.getElementById("carbs").value,
        weight: document.getElementById("weight").value
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        });

        const text = await res.text();
        if (!res.ok) throw new Error(text);

        alert("成功寫入 Google Sheet");
        resetForm();

    } catch (err) {
        updateStatus("上傳失敗: " + err.message);
    } finally {
        toggleInputs(true);
    }
}

// =====================
// UI HELPERS
// =====================
function updateStatus(msg){
    document.getElementById("status").innerText = msg;
}

function toggleInputs(enable){
    document.getElementById("analyzeBtn").disabled = !enable;
    document.getElementById("uploadBtn").disabled = !enable;
}

function resetForm(){
    document.getElementById("correctionPanel").style.display = "none";
    document.getElementById("correctionInput").value = "";

    document.getElementById("content").value = "";
    document.getElementById("calories").value = "";
    document.getElementById("protein").value = "";
    document.getElementById("fat").value = "";
    document.getElementById("carbs").value = "";
    document.getElementById("weight").value = "";

    document.getElementById("uploadBtn").disabled = true;
}
</script>
