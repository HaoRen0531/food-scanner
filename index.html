<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss AI 飲食秘書</title>

    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:disabled {
            background: #ccc;
        }

        img {
            width: 100%;
            margin-top: 10px;
            display: none;
        }

        #status {
            text-align: center;
            margin-top: 10px;
            color: #666;
        }

        .row {
            display: flex;
            gap: 5px;
        }

        .row input {
            flex: 1;
        }
    </style>
</head>

<body>
<div class="app">
    <h2>🥗 AI 飲食秘書</h2>

    <input type="file" id="imageInput" accept="image/*">
    <img id="previewImage">

    <button id="analyzeBtn">開始辨識</button>

    <div id="status"></div>

    <hr>

    <input id="correctionInput" placeholder="修正，例如：飯只有半碗">
    <button id="retryBtn">重新分析</button>

    <hr>

    <input id="content" placeholder="食物名稱">
    
    <div class="row">
        <input id="calories" placeholder="熱量">
        <input id="protein" placeholder="蛋白">
    </div>

    <div class="row">
        <input id="fat" placeholder="脂肪">
        <input id="carbs" placeholder="碳水">
        <input id="weight" placeholder="重量">
    </div>

    <button id="uploadBtn" disabled>寫入 Google Sheet</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

const API_URL = "https://meal-logger-973733682193.asia-east1.run.app";

let currentBase64 = "";

// ===== 元素 =====
const imageInput = document.getElementById("imageInput");
const previewImage = document.getElementById("previewImage");
const status = document.getElementById("status");

// ===== 圖片 =====
imageInput.addEventListener("change", function(e){
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        previewImage.src = event.target.result;
        previewImage.style.display = "block";
        currentBase64 = event.target.result.split(",")[1];
    };

    reader.readAsDataURL(file);
});

// ===== 分析 =====
document.getElementById("analyzeBtn").onclick = function(){
    if (!currentBase64) return alert("請先選圖片");

    updateStatus("AI 分析中...");
    callApi({ image: currentBase64 });
};

// ===== 重算 =====
document.getElementById("retryBtn").onclick = function(){
    const correction = document.getElementById("correctionInput").value;
    if (!correction) return alert("請輸入修正");

    updateStatus("重新分析中...");
    callApi({
        image: currentBase64,
        correction: correction
    });
};

// ===== API =====
async function callApi(payload){
    try {
        const res = await fetch(API_URL + "/analyze", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        });

        const text = await res.text();
        console.log("RAW:", text);

        let data;

        try {
            data = JSON.parse(text);
        } catch {
            const match = text.match(/\{[\s\S]*\}/);
            if (!match) throw new Error("不是 JSON");
            data = JSON.parse(match[0]);
        }

        fillForm(data);
        updateStatus("完成");

    } catch (err){
        updateStatus("錯誤：" + err.message);
        console.error(err);
    }
}

// ===== 填表 =====
function fillForm(data){
    document.getElementById("content").value = data.content || "";
    document.getElementById("calories").value = data.calories ?? 0;
    document.getElementById("protein").value = data.protein ?? 0;
    document.getElementById("fat").value = data.fat ?? 0;
    document.getElementById("carbs").value = data.carbs ?? 0;
    document.getElementById("weight").value = data.weight ?? 0;

    document.getElementById("uploadBtn").disabled = false;
}

// ===== 上傳 =====
document.getElementById("uploadBtn").onclick = async function(){
    updateStatus("寫入中...");

    const payload = {
        date: new Date().toLocaleDateString("zh-TW"),
        category: "AI辨識",
        content: document.getElementById("content").value,
        calories: document.getElementById("calories").value,
        protein: document.getElementById("protein").value,
        fat: document.getElementById("fat").value,
        carbs: document.getElementById("carbs").value,
        weight: document.getElementById("weight").value
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error(await res.text());

        alert("成功寫入！");
        location.reload();

    } catch (err){
        updateStatus("上傳失敗：" + err.message);
    }
};

// ===== UI =====
function updateStatus(msg){
    status.innerText = msg;
}

});
</script>

</body>
</html>
